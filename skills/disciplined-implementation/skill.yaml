id: disciplined-implementation
slug: disciplined-implementation
name: Disciplined Implementation
version: 1.1.0
summary: Strict test-first implementation loop with full-gate verification, real-artifact checks, independent review, and auditable reporting.
description: >-
  An intentionally strict, portable engineering method for substantial coding
  tasks. It requires orientation, grounded planning, RED→GREEN, complete
  verification before every commit, real-artifact checks, independent review,
  and exact evidence; waivers are limited to impossible or inapplicable steps.
author: Scott Weiss
license: MIT

