name: Validate Marketplace

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-validation.txt

      - name: Compile validator
        run: python -m py_compile scripts/validate_marketplace.py

      - name: Validate marketplace contracts
        run: python scripts/validate_marketplace.py
